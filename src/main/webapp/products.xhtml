<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<ui:composition template="WEB-INF/templates/base.xhtml">
    <ui:define name="content">

        <div class="si-section-title">
            <i class="pi pi-warehouse" />
            <span>Inventario</span>
        </div>

        <h:form id="productsForm">
            <p:growl id="msgProductos" showDetail="true" life="4000" />

            <!-- ===== KPIs del Inventario ===== -->
            <div class="si-kpi-grid" style="margin-bottom:1.5rem;">
                <div class="si-kpi-card">
                    <span class="si-kpi-icon blue"><i class="pi pi-box" /></span>
                    <div>
                        <div class="si-kpi-value">#{productoBean.totalProductos}</div>
                        <div class="si-kpi-label">Total Productos</div>
                    </div>
                </div>
                <div class="si-kpi-card">
                    <span class="si-kpi-icon green"><i class="pi pi-dollar" /></span>
                    <div>
                        <div class="si-kpi-value">
                            <h:outputText value="#{productoBean.valorTotalInventario}">
                                <f:convertNumber type="currency" currencySymbol="$" />
                            </h:outputText>
                        </div>
                        <div class="si-kpi-label">Valor Total</div>
                    </div>
                </div>
                <div class="si-kpi-card">
                    <span class="si-kpi-icon orange"><i class="pi pi-exclamation-triangle" /></span>
                    <div>
                        <div class="si-kpi-value">#{productoBean.stockBajo}</div>
                        <div class="si-kpi-label">Stock Bajo</div>
                    </div>
                </div>
                <div class="si-kpi-card">
                    <span class="si-kpi-icon purple"><i class="pi pi-check-circle" /></span>
                    <div>
                        <div class="si-kpi-value">#{productoBean.stockDisponible}</div>
                        <div class="si-kpi-label">Disponibles</div>
                    </div>
                </div>
            </div>

            <!-- ===== Toolbar de búsqueda y acciones ===== -->
            <div class="si-glass-card" style="margin-bottom:1.5rem;">
                <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;justify-content:space-between;">
                    <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;flex:1;">
                        <p:inputText id="search" value="#{productoBean.searchTerm}" placeholder="🔍 Buscar producto..." 
                                    style="flex:1;min-width:280px;padding:0.75rem 1rem;border-radius:8px;border:1px solid var(--si-border);">
                            <p:ajax event="keyup" listener="#{productoBean.search()}" update="tablaProductos" delay="300" />
                        </p:inputText>
                        
                        <p:selectOneMenu id="filtroCategoria" value="#{productoBean.filtroCategoria}" style="width:200px;padding:0.75rem;border-radius:8px;">
                            <f:selectItem itemLabel="Todas las categorías" itemValue="#{null}" />
                            <f:selectItems value="#{inventarioBean.categorias}" var="cat" itemLabel="#{cat}" itemValue="#{cat}" />
                            <p:ajax listener="#{productoBean.filter()}" update="tablaProductos" />
                        </p:selectOneMenu>
                        
                        <p:selectOneMenu id="filtroEstado" value="#{productoBean.filtroEstado}" style="width:150px;padding:0.75rem;border-radius:8px;">
                            <f:selectItem itemLabel="Todos los estados" itemValue="#{null}" />
                            <f:selectItem itemLabel="Disponible" itemValue="disponible" />
                            <f:selectItem itemLabel="Stock bajo" itemValue="bajo" />
                            <f:selectItem itemLabel="Agotado" itemValue="agotado" />
                            <p:ajax listener="#{productoBean.filter()}" update="tablaProductos" />
                        </p:selectOneMenu>
                    </div>
                    
                    <div style="display:flex;gap:0.5rem;">
                        <p:commandButton icon="pi pi-filter-slash" title="Limpiar filtros" action="#{productoBean.clearFilters()}" update="productsForm" styleClass="p-button-outlined p-button-secondary" />
                        <p:button value="Adquirir Producto" icon="pi pi-shopping-cart" outcome="/purchase.xhtml" styleClass="p-button-rounded p-button-primary" />
                    </div>
                </div>
            </div>

            <!-- ===== Tabla de productos ===== -->
            <div class="si-glass-card">
                <p:dataTable id="tablaProductos" value="#{productoBean.productosFiltrados}" var="p"
                             emptyMessage="No se encontraron productos."
                             rows="15" paginator="true" paginatorPosition="bottom"
                             style="width:100%" filteredValue="#{productoBean.productosFiltrados}"
                             rowStyleClass="#{p.stock lt p.stockMinimo ? 'row-warning' : ''}">
                    
                    <p:column headerText="Código" width="10%" filterBy="#{p.codigo}" filterMatchMode="contains">
                        <div style="font-weight:600;color:var(--si-primary);">#{p.codigo}</div>
                    </p:column>
                    
                    <p:column headerText="Producto" width="28%" filterBy="#{p.name}" filterMatchMode="contains">
                        <div style="display:flex;align-items:center;gap:1rem;">
                            <div style="width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--si-primary) 0%,var(--si-primary-dark) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;">
                                <i class="pi pi-box" />
                            </div>
                            <div>
                                <div style="font-weight:700;color:var(--si-text-primary);font-size:1rem;">#{p.name}</div>
                                <div style="font-size:0.85rem;color:var(--si-text-secondary);margin-top:0.25rem;">#{p.description}</div>
                            </div>
                        </div>
                    </p:column>
                    
                    <p:column headerText="Categoría" width="12%" filterBy="#{p.categoria}" filterMatchMode="contains">
                        <span style="background:var(--si-bg);padding:0.4rem 0.8rem;border-radius:6px;font-size:0.85rem;font-weight:500;color:var(--si-text-secondary);">#{p.categoria}</span>
                    </p:column>
                    
                    <p:column headerText="Stock" width="12%" sortBy="#{p.stock}">
                        <div style="text-align:center;">
                            <h:outputText value="#{p.stock}" style="font-weight:700;font-size:1.1rem;" styleClass="#{p.stock lt p.minStock ? 'text-danger' : 'text-success'}" />
                            <div style="font-size:0.75rem;color:var(--si-text-secondary);margin-top:0.25rem;">Mín: #{p.minStock}</div>
                        </div>
                    </p:column>
                    
                    <p:column headerText="Precio Venta" width="12%" sortBy="#{p.salePrice}">
                        <div style="font-weight:600;color:var(--si-success);font-size:1rem;">
                            <h:outputText value="#{p.salePrice}">
                                <f:convertNumber type="currency" currencySymbol="$" />
                            </h:outputText>
                        </div>
                    </p:column>
                    
                    <p:column headerText="Precio Compra" width="12%" sortBy="#{p.purchasePrice}">
                        <div style="font-weight:500;color:var(--si-text-secondary);font-size:0.9rem;">
                            <h:outputText value="#{p.purchasePrice}">
                                <f:convertNumber type="currency" currencySymbol="$" />
                            </h:outputText>
                        </div>
                    </p:column>
                    
                    <p:column headerText="Estado" width="10%">
                        <span class="product-badge #{p.estado.cssClass}" style="font-size:0.8rem;padding:0.4rem 0.8rem;border-radius:6px;">#{p.estado.texto}</span>
                    </p:column>
                    
                    <p:column headerText="Acciones" width="14%" style="text-align:center;">
                        <div style="display:flex;gap:0.5rem;justify-content:center;">
                            <p:commandButton icon="pi pi-pencil" title="Editar" styleClass="rounded-button ui-button-info"
                                            action="#{productoBean.editar(p)}" update="dialogProducto" oncomplete="PF('dialogProducto').show()" />
                            <p:commandButton icon="pi pi-trash" title="Eliminar" styleClass="rounded-button ui-button-danger"
                                            action="#{productoBean.eliminar(p)}" update="msgProductos tablaProductos" />
                        </div>
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <!-- ===== Diálogo para crear/editar producto ===== -->
        <p:dialog widgetVar="dialogProducto" header="#{productoBean.producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}" 
                  modal="true" closable="true" resizable="false" width="600" showEffect="fade" hideEffect="fade">
            
            <h:form id="productoForm">
                <p:growl id="msgProductoForm" showDetail="true" life="4000" />
                
                <div class="si-form-card">
                    <p:panelGrid columns="2" layout="grid" styleClass="ui-noborder" columnClasses="label-column,input-column">
                        
                        <p:outputLabel for="codigo" value="Código/SKU:" />
                        <p:inputText id="codigo" value="#{productoBean.producto.codigo}" placeholder="Ej. CAF-001" required="true" style="width:100%" />
                        
                        <p:outputLabel for="nombre" value="Nombre:" />
                        <p:inputText id="nombre" value="#{productoBean.producto.name}" placeholder="Nombre del producto" required="true" style="width:100%" />
                        
                        <p:outputLabel for="categoria" value="Categoría:" />
                        <p:selectOneMenu id="categoria" value="#{productoBean.producto.categoria}" required="true" style="width:100%">
                            <f:selectItem itemLabel="Seleccionar categoría" itemValue="#{null}" />
                            <f:selectItems value="#{inventarioBean.categorias}" var="cat" itemLabel="#{cat}" itemValue="#{cat}" />
                        </p:selectOneMenu>
                        
                        <p:outputLabel for="descripcion" value="Descripción:" />
                        <p:inputTextarea id="descripcion" value="#{productoBean.producto.description}" rows="3" style="width:100%" />
                        
                        <p:outputLabel for="precioVenta" value="Precio Venta:" />
                        <p:inputNumber id="precioVenta" value="#{productoBean.producto.salePrice}" symbol="$" decimalPlaces="2" required="true" style="width:100%" />
                        
                        <p:outputLabel for="precioCompra" value="Precio Compra:" />
                        <p:inputNumber id="precioCompra" value="#{productoBean.producto.purchasePrice}" symbol="$" decimalPlaces="2" required="true" style="width:100%" />
                        
                        <p:outputLabel for="stock" value="Stock Inicial:" />
                        <p:spinner id="stock" value="#{productoBean.producto.stock}" min="0" required="true" style="width:100%" />
                        
                        <p:outputLabel for="stockMinimo" value="Stock Mínimo:" />
                        <p:spinner id="stockMinimo" value="#{productoBean.producto.minStock}" min="0" required="true" style="width:100%" />
                        
                        <p:outputLabel for="imagen" value="Imagen:" />
                        <p:inputText id="imagen" value="#{productoBean.producto.imagen}" placeholder="nombre_imagen.jpg" style="width:100%" />
                        
                    </p:panelGrid>
                    
                    <div style="margin-top:1.5rem;text-align:right;">
                        <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('dialogProducto').hide()" 
                                        styleClass="p-button-outlined p-button-secondary" style="margin-right:0.5rem;" />
                        <p:commandButton value="Guardar" icon="pi pi-check" action="#{productoBean.guardar()}"
                                        update="msgProductoForm productsForm:tablaProductos" oncomplete="PF('dialogProducto').hide()" />
                    </div>
                </div>
            </h:form>
        </p:dialog>

    </ui:define>
</ui:composition>
</html>
