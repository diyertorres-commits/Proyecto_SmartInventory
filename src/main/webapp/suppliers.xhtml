<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<ui:composition template="WEB-INF/templates/base.xhtml">
    <ui:define name="content">

        <div class="si-section-title">
            <i class="pi pi-truck" />
            <span>Gestión de Proveedores</span>
        </div>

        <h:form id="suppliersForm">
            <p:growl id="msgProveedores" showDetail="true" life="4000" />

            <!-- ===== Toolbar de búsqueda y acciones ===== -->
            <div class="si-glass-card" style="margin-bottom:1.5rem;">
                <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
                    <p:inputText id="search" value="#{proveedorBean.searchTerm}" placeholder="Buscar por nombre, RUC o contacto" 
                                style="flex:1;min-width:250px;">
                        <p:ajax event="keyup" listener="#{proveedorBean.search()}" update="tablaProveedores" delay="300" />
                    </p:inputText>
                    
                    <p:commandButton icon="pi pi-search" title="Buscar" action="#{proveedorBean.search()}" update="tablaProveedores" />
                    <p:commandButton icon="pi pi-filter-slash" title="Limpiar búsqueda" action="#{proveedorBean.clearSearch()}" update="suppliersForm" />
                    <p:commandButton value="Nuevo Proveedor" icon="pi pi-plus" onclick="PF('dialogProveedor').show()" styleClass="p-button-rounded" />
                </div>
            </div>

            <!-- ===== Tabla de proveedores ===== -->
            <div class="si-glass-card">
                <p:dataTable id="tablaProveedores" value="#{proveedorBean.proveedoresFiltrados}" var="prov"
                             emptyMessage="No se encontraron proveedores."
                             rows="10" paginator="true" paginatorPosition="bottom"
                             style="width:100%">
                    
                    <p:column headerText="RUC/DNI" width="15%" filterBy="#{prov.ruc}" filterMatchMode="contains">
                        <h:outputText value="#{prov.ruc}" />
                    </p:column>
                    
                    <p:column headerText="Empresa" width="25%" filterBy="#{prov.nombre}" filterMatchMode="contains">
                        <div style="font-weight:600;color:var(--si-text-primary);">#{prov.nombre}</div>
                        <div style="font-size:0.8rem;color:var(--si-text-secondary);">#{prov.razonSocial}</div>
                    </p:column>
                    
                    <p:column headerText="Contacto" width="20%">
                        <div><i class="pi pi-user" style="font-size:0.8rem;margin-right:0.3rem;" />#{prov.contacto}</div>
                        <div style="font-size:0.85rem;color:var(--si-text-secondary);"><i class="pi pi-phone" style="font-size:0.8rem;margin-right:0.3rem;" />#{prov.telefono}</div>
                    </p:column>
                    
                    <p:column headerText="Email" width="18%">
                        <h:outputText value="#{prov.email}" />
                    </p:column>
                    
                    <p:column headerText="Dirección" width="12%">
                        <h:outputText value="#{prov.direccion}" style="font-size:0.85rem;" />
                    </p:column>
                    
                    <p:column headerText="Acciones" width="10%">
                        <p:commandButton icon="pi pi-pencil" title="Editar" styleClass="rounded-button mr-2"
                                        action="#{proveedorBean.editar(prov)}" update="dialogProveedor" oncomplete="PF('dialogProveedor').show()" />
                        <p:commandButton icon="pi pi-trash" title="Eliminar" styleClass="rounded-button ui-button-danger"
                                        action="#{proveedorBean.eliminar(prov)}" update="msgProveedores tablaProveedores" />
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>

        <!-- ===== Diálogo para crear/editar proveedor ===== -->
        <p:dialog widgetVar="dialogProveedor" header="#{proveedorBean.proveedor.id == null ? 'Nuevo Proveedor' : 'Editar Proveedor'}" 
                  modal="true" closable="true" resizable="false" width="600" showEffect="fade" hideEffect="fade">
            
            <h:form id="proveedorForm">
                <p:growl id="msgProveedorForm" showDetail="true" life="4000" />
                
                <div class="si-form-card">
                    <p:panelGrid columns="2" layout="grid" styleClass="ui-noborder" columnClasses="label-column,input-column">
                        
                        <p:outputLabel for="ruc" value="RUC/DNI:" />
                        <p:inputText id="ruc" value="#{proveedorBean.proveedor.ruc}" placeholder="Número de identificación" required="true" style="width:100%" />
                        
                        <p:outputLabel for="nombre" value="Nombre Comercial:" />
                        <p:inputText id="nombre" value="#{proveedorBean.proveedor.nombre}" placeholder="Nombre de la empresa" required="true" style="width:100%" />
                        
                        <p:outputLabel for="razonSocial" value="Razón Social:" />
                        <p:inputText id="razonSocial" value="#{proveedorBean.proveedor.razonSocial}" placeholder="Razón social completa" style="width:100%" />
                        
                        <p:outputLabel for="contacto" value="Persona Contacto:" />
                        <p:inputText id="contacto" value="#{proveedorBean.proveedor.contacto}" placeholder="Nombre del contacto" required="true" style="width:100%" />
                        
                        <p:outputLabel for="telefono" value="Teléfono:" />
                        <p:inputText id="telefono" value="#{proveedorBean.proveedor.telefono}" placeholder="Número de teléfono" required="true" style="width:100%" />
                        
                        <p:outputLabel for="email" value="Email:" />
                        <p:inputText id="email" value="#{proveedorBean.proveedor.email}" placeholder="correo@empresa.com" style="width:100%" />
                        
                        <p:outputLabel for="direccion" value="Dirección:" />
                        <p:inputTextarea id="direccion" value="#{proveedorBean.proveedor.direccion}" rows="2" style="width:100%" />
                        
                        <p:outputLabel for="condicionesPago" value="Condiciones Pago:" />
                        <p:selectOneMenu id="condicionesPago" value="#{proveedorBean.proveedor.condicionesPago}" style="width:100%">
                            <f:selectItem itemLabel="Contado" itemValue="contado" />
                            <f:selectItem itemLabel="30 días" itemValue="30" />
                            <f:selectItem itemLabel="60 días" itemValue="60" />
                            <f:selectItem itemLabel="90 días" itemValue="90" />
                        </p:selectOneMenu>
                        
                        <p:outputLabel for="activo" value="Estado:" />
                        <p:selectBooleanCheckbox id="activo" value="#{proveedorBean.proveedor.activo}" itemLabel="Proveedor activo" />
                        
                    </p:panelGrid>
                    
                    <div style="margin-top:1.5rem;text-align:right;">
                        <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('dialogProveedor').hide()" 
                                        styleClass="p-button-outlined p-button-secondary" style="margin-right:0.5rem;" />
                        <p:commandButton value="Guardar" icon="pi pi-check" action="#{proveedorBean.guardar()}" 
                                        update="msgProveedorForm suppliersForm:tablaProveedores" oncomplete="if(!args.validationFailed) PF('dialogProveedor').hide()" />
                    </div>
                </div>
            </h:form>
        </p:dialog>

    </ui:define>
</ui:composition>
</html>
